services:
  scdl-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scdl_web
    user: "0:0"
    working_dir: /app
    command:
      - python
      - -m
      - uvicorn
      - scdl_web.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8090"
    ports:
      - "8091:8090"
    environment:
      - PUID=1001
      - PGID=100
      - TZ=America/New_York
      - PYTHONPATH=/app
      - DOWNLOAD_DIR=/downloads
      - CONFIG_DIR=/config
      - DEFAULT_PRESET=best-original
      - SOUNDCLOUD_AUTH_TOKEN=
      - MAX_CONCURRENT_DOWNLOADS=1
      - DOWNLOAD_DELAY_SECONDS=10
      - MAX_RATE_LIMIT_BACKOFF_SECONDS=900
      - MAX_CONSECUTIVE_RATE_LIMITS=8
      - DEFAULT_PROFILE_DOWNLOAD_TYPE=uploads
      - SCDL_RELIABLE_SYNC_ENABLED=false
      - SCDL_MAX_CONCURRENT_DOWNLOADS=1
      - SCDL_BATCH_SIZE=500
      - SCDL_SMOKE_TEST_BATCH_SIZE=10
      - SCDL_MIN_TRACK_DELAY_SECONDS=150
      - SCDL_MAX_TRACK_DELAY_SECONDS=240
      - SCDL_HARD_MIN_DELAY_SECONDS=120
      - SCDL_TARGET_BATCH_MIN_HOURS=24
      - SCDL_TARGET_BATCH_MAX_HOURS=36
      - SCDL_METADATA_TIMEOUT_SECONDS=60
      - SCDL_MEDIA_RESOLVE_TIMEOUT_SECONDS=90
      - SCDL_CONNECT_TIMEOUT_SECONDS=30
      - SCDL_READ_TIMEOUT_SECONDS=300
      - SCDL_FFMPEG_TIMEOUT_SECONDS=1800
      - SCDL_COLLECTION_PAGE_TIMEOUT_SECONDS=90
      - SCDL_SUBPROCESS_TIMEOUT_SECONDS=0
      - SCDL_SUBPROCESS_TERMINATION_GRACE_SECONDS=15
      - SCDL_STALL_CONFIRMATION_SECONDS=30
      - SCDL_LIKES_CHECK_INTERVAL_MINUTES=30
      - SCDL_MIN_FREE_SPACE_GB=20
      - SCDL_DIAGNOSTIC_MODE=true
      - SCDL_DIAGNOSTIC_LOG_MAX_MB=100
      - SCDL_DIAGNOSTIC_LOG_BACKUP_COUNT=10
    volumes:
      - /volume1/arr-stack-music/downloads/music/soundcloud:/downloads
      - /volume3/docker/music-stack/appdata/scdl:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
